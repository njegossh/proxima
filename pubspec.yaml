name: proxima
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  
  shared_preferences: any
  cloud_firestore: ^5.6.11
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  syncfusion_flutter_calendar: ^30.1.41
  carousel_slider: ^5.1.1
  oktoast: ^3.2.1
  cupertino_icons: ^1.0.8
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  youtube_player_iframe: ^5.2.1
  intl: ^0.20.2
  easy_stars: ^1.0.9
  kalender: ^0.12.0
  image_picker: ^1.2.0
  image: ^4.5.4
  flutter_svg: ^2.2.1
  lottie: ^3.1.0
  zego_uikit_prebuilt_call: ^4.17.7
  floating: ^6.0.0
  easy_localization: ^3.0.7
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/proximaLogo.png"
  android_adaptive_icon_foreground: "assets/icons/proximaLogo.png"
  android_adaptive_icon_background: "#000000"
#dart run flutter_launcher_icons

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/Inter.ttf
  assets:
    - assets/images/
    - assets/animations/logoAnimated.gif
    - assets/translations/
